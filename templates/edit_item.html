<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Item - Home Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <h2 class="mb-4">Edit Item</h2>
            <form action="{{ url_for('edit_item', item_id=item.id) }}" method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label">Item Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ item.name }}" required>
                </div>
                <div class="mb-3">
                    <label for="sn" class="form-label">Serial Number (SN)</label>
                    <input type="text" class="form-control" id="sn" name="sn" value="{{ item.sn or '' }}">
                </div>
                <div class="mb-3">
                    <label for="category_id" class="form-label">Category</label>
                    <select class="form-select" id="category_id" name="category_id" required>
                        {% for category in categories %}
                            <option value="{{ category.id }}" {% if category.id == item.category_id %}selected{% endif %}>{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="location_id" class="form-label">Location</label>
                    <select class="form-select" id="location_id" name="location_id" required>
                        {% for loc in locations %}
                            <option value="{{ loc.id }}" {% if loc.id == item.location_id %}selected{% endif %}>{{ loc.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="storage_box_id" class="form-label">Storage Box (Optional)</label>
                    <select class="form-select" id="storage_box_id" name="storage_box_id">
                        <option value="">None</option>
                        {% for box in boxes %}
                            <option value="{{ box.id }}" {% if box.id == item.storage_box_id %}selected{% endif %}>{{ box.name }} (in {{ box.location.name }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="quantity" class="form-label">Quantity</label>
                    <input type="number" class="form-control" id="quantity" name="quantity" value="{{ item.quantity }}" min="1">
                </div>
                <div class="mb-3">
                    <label for="geo_location" class="form-label">Geo Location</label>
                    <input type="text" class="form-control" id="geo_location" name="geo_location" value="{{ item.geo_location }}">
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3">{{ item.description }}</textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1">Update Item</button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
