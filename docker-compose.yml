version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    ports:
      - "8082:80"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/inventory
      - FLASK_APP=app.py
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
